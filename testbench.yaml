providers:
  - PayHere\PayHereServiceProvider
  - Workbench\App\Providers\WorkbenchServiceProvider

migrations:
  - workbench/database/migrations

workbench:
  start: /
  install: true
  user: hello@dasun.dev
  guard: web
  discovers:
    web: true
    api: true
  build:
    - create-sqlite-db
    - migrate:fresh
    - db:seed
  sync:
    - from: ./dist/
      to: public/vendor/payhere
